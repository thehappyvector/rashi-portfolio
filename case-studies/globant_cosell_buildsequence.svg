<svg viewBox="0 0 1100 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>

  <rect width="1100" height="620" fill="#ffffff"/>

  <text x="550" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">From Invisible to Indispensable: Building Globant's Microsoft Alliance</text>
  <text x="550" y="58" text-anchor="middle" font-size="13" fill="#666">2021–2025 · The build sequence — visibility before process, targeting before scale</text>

  <!-- 4 sequential steps -->
  <!-- Step 1 -->
  <rect x="30" y="100" width="240" height="150" rx="8" fill="#fff8ec" stroke="#e0b866" stroke-width="1.5"/>
  <text x="150" y="128" text-anchor="middle" font-size="13" font-weight="bold" fill="#8a5a1a">STEP 1</text>
  <text x="150" y="150" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Attribution &amp; Tracking</text>
  <text x="150" y="172" text-anchor="middle" font-size="11" fill="#666">Built formal co-sell</text>
  <text x="150" y="188" text-anchor="middle" font-size="11" fill="#666">tracking to tag Globant's</text>
  <text x="150" y="204" text-anchor="middle" font-size="11" fill="#666">work to Microsoft ACV —</text>
  <text x="150" y="220" text-anchor="middle" font-size="11" fill="#666">making value visible</text>

  <line x1="270" y1="175" x2="305" y2="175" stroke="#555" stroke-width="2.5" marker-end="url(#arrow2)"/>

  <!-- Step 2 -->
  <rect x="305" y="100" width="240" height="150" rx="8" fill="#fff8ec" stroke="#e0b866" stroke-width="1.5"/>
  <text x="425" y="128" text-anchor="middle" font-size="13" font-weight="bold" fill="#8a5a1a">STEP 2</text>
  <text x="425" y="150" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Targeting the Right Play</text>
  <text x="425" y="172" text-anchor="middle" font-size="11" fill="#666">Built case studies on Azure/</text>
  <text x="425" y="188" text-anchor="middle" font-size="11" fill="#666">Microsoft stack; focused on</text>
  <text x="425" y="204" text-anchor="middle" font-size="11" fill="#666">data products across</text>
  <text x="425" y="220" text-anchor="middle" font-size="11" fill="#666">entertainment, hospitality,</text>
  <text x="425" y="234" text-anchor="middle" font-size="11" fill="#666">live sports, healthcare</text>

  <line x1="545" y1="175" x2="580" y2="175" stroke="#555" stroke-width="2.5" marker-end="url(#arrow2)"/>

  <!-- Step 3 -->
  <rect x="580" y="100" width="240" height="150" rx="8" fill="#fff8ec" stroke="#e0b866" stroke-width="1.5"/>
  <text x="700" y="128" text-anchor="middle" font-size="13" font-weight="bold" fill="#8a5a1a">STEP 3</text>
  <text x="700" y="150" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Co-Sell Process Design</text>
  <text x="700" y="172" text-anchor="middle" font-size="11" fill="#666">Designed the repeatable</text>
  <text x="700" y="188" text-anchor="middle" font-size="11" fill="#666">motion for joint deal</text>
  <text x="700" y="204" text-anchor="middle" font-size="11" fill="#666">sourcing between Globant</text>
  <text x="700" y="220" text-anchor="middle" font-size="11" fill="#666">and Microsoft sales teams</text>

  <line x1="820" y1="175" x2="855" y2="175" stroke="#555" stroke-width="2.5" marker-end="url(#arrow2)"/>

  <!-- Step 4 -->
  <rect x="855" y="100" width="215" height="150" rx="8" fill="#fff8ec" stroke="#e0b866" stroke-width="1.5"/>
  <text x="962" y="128" text-anchor="middle" font-size="13" font-weight="bold" fill="#8a5a1a">STEP 4</text>
  <text x="962" y="150" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Institutionalize</text>
  <text x="962" y="172" text-anchor="middle" font-size="11" fill="#666">Enablement program +</text>
  <text x="962" y="188" text-anchor="middle" font-size="11" fill="#666">training for 510+ execs</text>
  <text x="962" y="204" text-anchor="middle" font-size="11" fill="#666">(NA/EMEA/LATAM) +</text>
  <text x="962" y="220" text-anchor="middle" font-size="11" fill="#666">MSFT leaders at events</text>

  <!-- down arrows to outcome -->
  <line x1="150" y1="250" x2="150" y2="300" stroke="#999" stroke-width="2"/>
  <line x1="425" y1="250" x2="425" y2="300" stroke="#999" stroke-width="2"/>
  <line x1="700" y1="250" x2="700" y2="300" stroke="#999" stroke-width="2"/>
  <line x1="962" y1="250" x2="962" y2="300" stroke="#999" stroke-width="2"/>
  <line x1="150" y1="300" x2="962" y2="300" stroke="#999" stroke-width="2"/>
  <line x1="556" y1="300" x2="556" y2="330" stroke="#999" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Outcome box -->
  <rect x="180" y="345" width="740" height="220" rx="10" fill="#f0f7f0" stroke="#5fa85f" stroke-width="1.5"/>
  <text x="550" y="378" text-anchor="middle" font-size="15" font-weight="bold" fill="#2f6b2f">RESULT — 2021 to 2025</text>

  <rect x="210" y="395" width="330" height="70" rx="6" fill="#ffffff" stroke="#8bc98b"/>
  <text x="375" y="420" text-anchor="middle" font-size="15" font-weight="bold" fill="#2f6b2f">$41M → $533M ACV</text>
  <text x="375" y="440" text-anchor="middle" font-size="11" fill="#556" >1200% YoY — co-sell contract value (bookings)</text>
  <text x="375" y="455" text-anchor="middle" font-size="10" fill="#889">not recognized revenue</text>

  <rect x="560" y="395" width="330" height="70" rx="6" fill="#ffffff" stroke="#8bc98b"/>
  <text x="725" y="420" text-anchor="middle" font-size="15" font-weight="bold" fill="#2f6b2f">$150M → $270M Revenue</text>
  <text x="725" y="440" text-anchor="middle" font-size="11" fill="#556">80% growth — total partnership-attributed</text>
  <text x="725" y="455" text-anchor="middle" font-size="10" fill="#889">$30M net-new + $65M expansion + $25M influenced</text>

  <text x="550" y="490" text-anchor="middle" font-size="12" fill="#333">510+ sales executives trained across NA, EMEA, and LATAM</text>
  <text x="550" y="512" text-anchor="middle" font-size="12" fill="#333">3-year Live Sports &amp; Entertainment partnership established</text>
  <text x="550" y="540" text-anchor="middle" font-size="12" font-style="italic" fill="#2f6b2f" font-weight="bold">No direct reports were added. The scale-up came from the system, not the team.</text>

  <text x="550" y="595" text-anchor="middle" font-size="11" fill="#888" font-style="italic">Sequence: visibility → targeting → process → institutionalization</text>
</svg>
