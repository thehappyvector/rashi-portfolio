<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow6" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>

  <rect width="900" height="420" fill="#ffffff"/>

  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a1a">MomNeeds: The Coordination Was the Product</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#666">No app. No backend. No team. Just a manual process run entirely through WhatsApp.</text>

  <!-- Mother -->
  <rect x="40" y="100" width="220" height="130" rx="8" fill="#fdf6ec" stroke="#C77D2E" stroke-width="1.5"/>
  <text x="150" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Mother</text>
  <text x="150" y="152" text-anchor="middle" font-size="11" fill="#666">Sends a WhatsApp</text>
  <text x="150" y="168" text-anchor="middle" font-size="11" fill="#666">message requesting</text>
  <text x="150" y="184" text-anchor="middle" font-size="11" fill="#666">an appointment or</text>
  <text x="150" y="200" text-anchor="middle" font-size="11" fill="#666">follow-up</text>

  <line x1="260" y1="165" x2="310" y2="165" stroke="#555" stroke-width="2.5" marker-end="url(#arrow6)"/>

  <!-- Me -->
  <rect x="310" y="90" width="280" height="150" rx="8" fill="#fff3e6" stroke="#8a5a1a" stroke-width="2"/>
  <text x="450" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#8a5a1a">ME, MANUALLY</text>
  <text x="450" y="145" text-anchor="middle" font-size="11" fill="#333">Coordinating scheduling,</text>
  <text x="450" y="163" text-anchor="middle" font-size="11" fill="#333">provider availability, and</text>
  <text x="450" y="181" text-anchor="middle" font-size="11" fill="#333">follow-ups by hand, one</text>
  <text x="450" y="199" text-anchor="middle" font-size="11" fill="#333">conversation at a time</text>
  <text x="450" y="222" text-anchor="middle" font-size="11" font-weight="bold" fill="#8a5a1a">No software involved</text>

  <line x1="590" y1="165" x2="640" y2="165" stroke="#555" stroke-width="2.5" marker-end="url(#arrow6)"/>

  <!-- Provider -->
  <rect x="640" y="100" width="220" height="130" rx="8" fill="#fdf6ec" stroke="#C77D2E" stroke-width="1.5"/>
  <text x="750" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Provider</text>
  <text x="750" y="152" text-anchor="middle" font-size="11" fill="#666">OB-GYN, nutritionist,</text>
  <text x="750" y="168" text-anchor="middle" font-size="11" fill="#666">or fitness instructor</text>
  <text x="750" y="184" text-anchor="middle" font-size="11" fill="#666">confirms availability</text>
  <text x="750" y="200" text-anchor="middle" font-size="11" fill="#666">and delivers care</text>

  <!-- return arrow -->
  <path d="M 750 230 L 750 260 L 150 260 L 150 230" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow6)"/>
  <text x="450" y="278" text-anchor="middle" font-size="10" fill="#888" font-style="italic">Loop repeats, one mother, one provider, one conversation at a time</text>

  <!-- Scale box -->
  <rect x="150" y="305" width="600" height="90" rx="10" fill="#f0f7f0" stroke="#5fa85f" stroke-width="1.5"/>
  <text x="450" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#2f6b2f">23 mothers</text>
  <text x="450" y="358" text-anchor="middle" font-size="12" fill="#333">served by a panel of 8 providers: 4 OB-GYNs, 2 nutritionists, 2 prenatal fitness instructors</text>
  <text x="450" y="380" text-anchor="middle" font-size="11" fill="#666" font-style="italic">Proof the model worked, before proposing to build any technology around it</text>
</svg>
