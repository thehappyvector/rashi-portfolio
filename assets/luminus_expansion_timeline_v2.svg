<svg viewBox="0 0 1100 640" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="1100" height="640" fill="#ffffff"/>

  <text x="550" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">Sequencing MENA Expansion: Hub &amp; Spoke Model</text>
  <text x="550" y="58" text-anchor="middle" font-size="12" fill="#666">Prioritized by GDP per capita, internet penetration, donor landscape, and regulatory environment</text>

  <!-- Hub -->
  <circle cx="550" cy="125" r="55" fill="#fff3e0" stroke="#d99b3a" stroke-width="2"/>
  <text x="550" y="118" text-anchor="middle" font-size="12" font-weight="bold" fill="#8a5a1a">MAIN HUB</text>
  <text x="550" y="138" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Dubai</text>

  <line x1="550" y1="180" x2="550" y2="212" stroke="#999" stroke-width="2" marker-end="url(#arrow4)"/>

  <!-- 2023 -->
  <rect x="300" y="220" width="500" height="95" rx="8" fill="#fdf6ec" stroke="#e0b866" stroke-width="1.5"/>
  <text x="550" y="245" text-anchor="middle" font-size="15" font-weight="bold" fill="#8a5a1a">2023: Pilot, 2 Countries</text>
  <text x="550" y="266" text-anchor="middle" font-size="11" fill="#333">Jordan (base) and Iraq</text>
  <text x="550" y="284" text-anchor="middle" font-size="11" fill="#666">Piloting the end-to-end process</text>
  <text x="550" y="300" text-anchor="middle" font-size="11" fill="#666">with existing technologies</text>

  <line x1="550" y1="315" x2="550" y2="347" stroke="#999" stroke-width="2" marker-end="url(#arrow4)"/>

  <!-- 2024 -->
  <rect x="260" y="355" width="580" height="95" rx="8" fill="#f5ece0" stroke="#c98a3a" stroke-width="1.5"/>
  <text x="550" y="380" text-anchor="middle" font-size="15" font-weight="bold" fill="#7a4a10">2024: Big Launch, 7 Countries</text>
  <text x="550" y="401" text-anchor="middle" font-size="11" fill="#333">2 pilot countries plus 5 more, including Saudi Arabia and Egypt</text>
  <text x="550" y="419" text-anchor="middle" font-size="11" fill="#666">Partnerships scale up and personalized,</text>
  <text x="550" y="435" text-anchor="middle" font-size="11" fill="#666">incentivized learning pathways are introduced</text>

  <line x1="550" y1="450" x2="550" y2="482" stroke="#999" stroke-width="2" marker-end="url(#arrow4)"/>

  <!-- 2025 left -->
  <rect x="30" y="220" width="290" height="325" rx="8" fill="#eef6ee" stroke="#5fa85f" stroke-width="1.5"/>
  <text x="175" y="248" text-anchor="middle" font-size="15" font-weight="bold" fill="#2f6b2f">2025: Expansion</text>
  <text x="175" y="270" text-anchor="middle" font-size="12" fill="#333">17 countries total</text>
  <text x="175" y="293" text-anchor="middle" font-size="11" fill="#666">7 prior countries plus</text>
  <text x="175" y="309" text-anchor="middle" font-size="11" fill="#666">10 more added</text>
  <text x="175" y="332" text-anchor="middle" font-size="11" fill="#666">Jordan physical facilities</text>
  <text x="175" y="348" text-anchor="middle" font-size="11" fill="#666">expanded alongside rollout</text>
  <text x="175" y="378" text-anchor="middle" font-size="11" font-weight="bold" fill="#2f6b2f">Positioning shift:</text>
  <text x="175" y="396" text-anchor="middle" font-size="11" fill="#333">Global corporate</text>
  <text x="175" y="412" text-anchor="middle" font-size="11" fill="#333">training provider</text>
  <text x="175" y="435" text-anchor="middle" font-size="11" fill="#666">Multi-language support</text>
  <text x="175" y="451" text-anchor="middle" font-size="11" fill="#666">and B2B international</text>
  <text x="175" y="467" text-anchor="middle" font-size="11" fill="#666">talent placement focus</text>

  <!-- 2026+ right -->
  <rect x="780" y="220" width="290" height="325" rx="8" fill="#eef4fb" stroke="#5a8bc9" stroke-width="1.5"/>
  <text x="925" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#153f75">2026 and Beyond</text>
  <text x="925" y="268" text-anchor="middle" font-size="13" font-weight="bold" fill="#153f75">Global Impact</text>
  <text x="925" y="294" text-anchor="middle" font-size="11" fill="#333">1M+ learners impacted</text>
  <text x="925" y="310" text-anchor="middle" font-size="11" fill="#666">(accumulated by 2029)</text>
  <text x="925" y="333" text-anchor="middle" font-size="11" font-weight="bold" fill="#153f75">Data-driven model with</text>
  <text x="925" y="349" text-anchor="middle" font-size="11" font-weight="bold" fill="#153f75">aligned rewards and incentives</text>
  <text x="925" y="374" text-anchor="middle" font-size="11" fill="#666">Positioned as the biggest</text>
  <text x="925" y="390" text-anchor="middle" font-size="11" fill="#666">education ecosystem in MENA</text>
  <text x="925" y="406" text-anchor="middle" font-size="11" fill="#666">by learner count</text>

  <text x="550" y="590" text-anchor="middle" font-size="12" fill="#888" font-style="italic">Sequencing, not just market size, is what turned the opportunity into an executable plan.</text>
</svg>
