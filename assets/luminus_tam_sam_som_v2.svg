<svg viewBox="0 0 900 640" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect width="900" height="640" fill="#ffffff"/>

  <text x="450" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">Sizing the MENA Opportunity: Luminus Life+</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#666">Market sizing built to underpin the growth strategy and investment narrative</text>

  <!-- TAM band -->
  <rect x="60" y="90" width="780" height="110" rx="10" fill="#eaf1fb" stroke="#7ea6d8" stroke-width="1.5"/>
  <text x="450" y="122" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a4a8a">TAM: $200B</text>
  <text x="450" y="146" text-anchor="middle" font-size="12" font-weight="bold" fill="#2a5a9a">Total Addressable Market</text>
  <text x="450" y="168" text-anchor="middle" font-size="11" fill="#4a6a8a">MENA youth education</text>
  <text x="450" y="184" text-anchor="middle" font-size="11" fill="#4a6a8a">and employment gap by 2030</text>

  <!-- SAM band -->
  <rect x="120" y="220" width="660" height="110" rx="10" fill="#d9e8fb" stroke="#5a8bc9" stroke-width="1.5"/>
  <text x="450" y="252" text-anchor="middle" font-size="17" font-weight="bold" fill="#153f75">SAM: $26B</text>
  <text x="450" y="276" text-anchor="middle" font-size="12" font-weight="bold" fill="#255080">Serviceable Addressable Market</text>
  <text x="450" y="298" text-anchor="middle" font-size="11" fill="#3d5f80">Consolidated across Luminus's</text>
  <text x="450" y="314" text-anchor="middle" font-size="11" fill="#3d5f80">3 core business lines</text>

  <!-- SOM MENA band -->
  <rect x="180" y="350" width="540" height="110" rx="10" fill="#c3d8f5" stroke="#3d6fb0" stroke-width="1.5"/>
  <text x="450" y="382" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f2f5c">SOM (MENA): $2B</text>
  <text x="450" y="406" text-anchor="middle" font-size="12" font-weight="bold" fill="#204568">Serviceable Obtainable Market, by 2030</text>
  <text x="450" y="428" text-anchor="middle" font-size="11" fill="#33526e">Realistic regional capture across</text>
  <text x="450" y="444" text-anchor="middle" font-size="11" fill="#33526e">B2B, B2C, B2D, and B2G combined</text>

  <!-- SOM Global band -->
  <rect x="240" y="480" width="420" height="100" rx="10" fill="#a9c6f0" stroke="#2c5a99" stroke-width="1.5"/>
  <text x="450" y="512" text-anchor="middle" font-size="16" font-weight="bold" fill="#0a2650">SOM (Global): $8B*</text>
  <text x="450" y="536" text-anchor="middle" font-size="11" fill="#1c3a5c">Global obtainable market, calculated</text>
  <text x="450" y="552" text-anchor="middle" font-size="11" fill="#1c3a5c">against comparable B2B education services</text>

  <text x="450" y="600" text-anchor="middle" font-size="11" fill="#888" font-style="italic">Starting point: $250M SOM in 2024, sequenced up to the $2B / $8B 2030 targets</text>
  <text x="450" y="620" text-anchor="middle" font-size="10" fill="#999" font-style="italic">*Global figure calculated against comparable global B2B services benchmarks</text>
</svg>
